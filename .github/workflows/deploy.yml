name: Trigger Vercel rebuild

# The live site (claudeconfig.ayande.xyz) is hosted on Vercel, which only
# rebuilds on a git push to this repo. But download URLs/sizes/checksums are
# synced from the claude-config Releases API at BUILD time — so a new app
# release doesn't refresh the site on its own.
#
# This workflow pings a Vercel Deploy Hook to force a rebuild (which re-runs
# `pnpm sync:release`). The claude-config release workflow pings the same hook
# on publish; this scheduled run is the self-heal safety net.
#
# Setup: create a Deploy Hook in Vercel (Project → Settings → Git → Deploy
# Hooks) and store its URL as the repo secret VERCEL_DEPLOY_HOOK_URL.

on:
  workflow_dispatch:
  # Self-heal: catch any release that didn't trigger a rebuild directly.
  schedule:
    - cron: "17 */6 * * *" # every 6 hours, off the :00 mark

concurrency:
  group: vercel-rebuild
  cancel-in-progress: true

jobs:
  ping:
    name: Ping Vercel deploy hook
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger rebuild
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_URL secret is not set. Add it in repo Settings → Secrets."
            exit 1
          fi
          echo "Triggering Vercel deploy hook…"
          code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$HOOK_URL")
          echo "Vercel responded with HTTP $code"
          case "$code" in
            2*) echo "Rebuild triggered." ;;
            *)  echo "::error::Deploy hook returned HTTP $code"; exit 1 ;;
          esac
